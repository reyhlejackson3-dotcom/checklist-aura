<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Shiftable Sprint" />
<meta name="theme-color" content="#0E1116" />
<title>Shiftable Sprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0E1116;
    --surface:#171B22;
    --surface-2:#1F2530;
    --line:#2A313D;
    --steel:#8B97A8;
    --steel-dim:#5D6675;
    --text:#E6EAF0;
    --amber:#F6A623;
    --amber-dim:#B87d1a;
    --green:#3FBF7F;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--ink);color:var(--text);}
  body{
    font-family:"Inter",system-ui,sans-serif;
    line-height:1.5;
    padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 40px);
    max-width:560px;margin:0 auto;
    min-height:100vh;
  }
  .mono{font-family:"JetBrains Mono",monospace;}
  .disp{font-family:"Space Grotesk",sans-serif;}

  /* ---- top status ---- */
  .status{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;}
  .status .day{font-family:"Space Grotesk";font-weight:700;font-size:30px;letter-spacing:-0.5px;line-height:1;}
  .status .day span{color:var(--amber);}
  .status .sub{color:var(--steel);font-size:13px;margin-top:6px;text-transform:uppercase;letter-spacing:1.5px;}
  .status .left{text-align:right;}
  .status .left .num{font-family:"JetBrains Mono";font-weight:700;font-size:22px;color:var(--text);}
  .status .left .lbl{color:var(--steel-dim);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}

  /* ---- gauge ---- */
  .gauge{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;margin-bottom:22px;
  }
  .gauge .grow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .gauge .glabel{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--steel);}
  .gauge .gread{font-family:"JetBrains Mono";font-weight:700;font-size:15px;color:var(--steel);}
  .gauge .gread b{color:var(--amber);font-size:26px;}
  .track{height:14px;background:var(--surface-2);border-radius:8px;overflow:hidden;position:relative;
    background-image:repeating-linear-gradient(90deg,transparent 0,transparent 9.5%,rgba(0,0,0,.35) 9.5%,rgba(0,0,0,.35) 10%);}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));
    border-radius:8px;transition:width .5s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 14px rgba(246,166,35,.35);}
  .gedit{display:flex;gap:8px;margin-top:14px;}
  .gedit input{
    flex:1;background:var(--ink);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font-family:"JetBrains Mono";font-size:15px;font-weight:700;
  }
  .gedit input:focus{outline:none;border-color:var(--amber);}
  .gedit button{
    background:var(--surface-2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:0 16px;font-weight:600;font-size:14px;cursor:pointer;font-family:"Inter";
  }
  .gedit button:active{background:var(--line);}

  /* ---- section head ---- */
  .mhead{display:flex;align-items:center;gap:10px;margin:4px 2px 14px;}
  .mhead h2{font-family:"Space Grotesk";font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--steel);}
  .mhead .dots{display:flex;gap:5px;margin-left:auto;}
  .mhead .dots i{width:7px;height:7px;border-radius:50%;background:var(--line);display:block;}
  .mhead .dots i.done{background:var(--green);}
  .mhead .dots i.now{background:var(--amber);box-shadow:0 0 8px rgba(246,166,35,.6);}

  /* ---- task cards ---- */
  .task{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .task .trow{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;}
  .tnum{font-family:"JetBrains Mono";font-weight:700;font-size:13px;color:var(--steel-dim);width:22px;flex-shrink:0;}
  .ttitle{flex:1;font-weight:600;font-size:15.5px;}
  .ttime{font-family:"JetBrains Mono";font-size:12px;color:var(--steel-dim);flex-shrink:0;}
  .tcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;}

  /* completed */
  .task.done{border-color:var(--line);}
  .task.done .ttitle{color:var(--steel);}
  .task.done .tnum{color:var(--green);}
  .task.done .tcheck{background:var(--green);border-color:var(--green);}
  .task.done .tcheck svg{display:block;}
  .task.done .ttime{opacity:0;}
  .tcheck svg{display:none;width:12px;height:12px;}

  /* active */
  .task.now{border-color:var(--amber);background:linear-gradient(180deg,rgba(246,166,35,.06),var(--surface) 60px);box-shadow:0 0 0 1px rgba(246,166,35,.25),0 8px 30px -12px rgba(246,166,35,.4);}
  .task.now .tnum{color:var(--amber);}
  .task.now .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle;}
  .tbody{padding:0 16px 16px 51px;}
  .tbody.collapsed{display:none;}
  .tbody .note{font-size:13px;color:var(--steel);margin-bottom:12px;}
  .tbody ul{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
  .tbody li{display:flex;gap:10px;font-size:14px;color:var(--text);align-items:flex-start;}
  .tbody li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);margin-top:7px;flex-shrink:0;}
  .tbody li.warn::before{background:var(--steel-dim);}
  .tbody li.warn{color:var(--steel);}
  .cbtn{width:100%;background:var(--amber);color:#231600;border:none;border-radius:11px;padding:14px;font-family:"Space Grotesk";font-weight:700;font-size:15px;letter-spacing:.3px;cursor:pointer;}
  .cbtn:active{background:var(--amber-dim);}

  /* locked */
  .task.locked{opacity:.5;}
  .task.locked .trow{cursor:default;}
  .task.locked .ttitle{color:var(--steel-dim);}
  .task.locked .lockicon{color:var(--steel-dim);width:22px;height:22px;flex-shrink:0;display:grid;place-items:center;}

  /* day complete */
  .complete{background:var(--surface);border:1px solid var(--green);border-radius:var(--radius);padding:24px 18px;text-align:center;}
  .complete h3{font-family:"Space Grotesk";font-size:20px;font-weight:700;margin-bottom:6px;}
  .complete p{color:var(--steel);font-size:13.5px;margin-bottom:18px;}
  .complete button{width:100%;background:var(--green);color:#04140b;border:none;border-radius:11px;padding:15px;font-family:"Space Grotesk";font-weight:700;font-size:15px;cursor:pointer;}
  .complete button:active{filter:brightness(.9);}

  /* footer */
  .foot{margin-top:30px;display:flex;justify-content:center;gap:22px;}
  .foot button{background:none;border:none;color:var(--steel-dim);font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:"Inter";}
  .foot button:active{color:var(--steel);}
</style>
</head>
<body>
  <div class="status">
    <div>
      <div class="day disp">DAY <span id="dayNum">1</span></div>
      <div class="sub" id="weekday">Monday · Sprint Start</div>
    </div>
    <div class="left">
      <div class="num" id="daysLeft">—</div>
      <div class="lbl">days to Sept 1</div>
    </div>
  </div>

  <div class="gauge">
    <div class="grow">
      <div class="glabel">Buyer accounts</div>
      <div class="gread"><b id="bc">0</b> / 1000</div>
    </div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="gedit">
      <input id="bcInput" type="number" min="0" inputmode="numeric" placeholder="current total" />
      <button id="bcSave">Save</button>
    </div>
  </div>

  <div class="mhead">
    <h2 id="mtitle">Today's Mission</h2>
    <div class="dots" id="dots"></div>
  </div>

  <div id="tasks"></div>
  <div id="dayComplete"></div>

  <div class="foot">
    <button id="resetDay">Reset today</button>
    <button id="resetAll">Reset everything</button>
  </div>

<script>
(function(){
  "use strict";

  /* ---------- storage (localStorage w/ in-memory fallback for preview) ---------- */
  var mem={};
  var store={
    get:function(k){try{var v=localStorage.getItem(k);return v===null?(k in mem?mem[k]:null):v;}catch(e){return (k in mem)?mem[k]:null;}},
    set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
  };

  var GOAL=1000;
  var SPRINT_END=new Date("2026-09-01T00:00:00");

  /* ---------- task library ---------- */
  function scoreboard(){return {t:"Scoreboard",time:"15m",
    note:"Face the numbers before you touch anything. Daily, not on Sept 1.",
    steps:[
      "Open your analytics — yesterday's visitors, new signups, click-outs.",
      "Update the gauge above with your real current account total.",
      "Today's target: 18 new signups. Write it where you'll see it.",
      "If yesterday missed target, name the one reason why."
    ]};}
  function outreach(){return {t:"Direct outreach",time:"90m",tag:"engine",
    note:"Your proven weapon — 4 pitches, 4 closes. This block never gets skipped.",
    steps:[
      "Pull today's list of target owners in your ONE chosen niche.",
      "Send 15–20 personalized DMs/emails — lead with THEIR problem, not your pitch.",
      "Name the exact Shiftable tool that solves it. Be specific.",
      "Log every reply for follow-up tomorrow.",
      {w:true,s:"A person you talk to is worth 50 passive visitors. Treat it that way."}
    ]};}
  function community(){return {t:"Community presence",time:"60m",
    note:"Go where owners already are. Facebook first, Reddit second.",
    steps:[
      "Open your 3–5 target Facebook groups (industry + local).",
      "Answer 5–8 real 'what AI tool for ___' questions — genuinely helpful.",
      "Drop your Finder result ONLY where it directly fits.",
      "Then r/smallbusiness + one trade sub, same play.",
      {w:true,s:"Zero spam. You're earning trust, not blasting links — they'll nuke you."}
    ]};}
  function content(){return {t:"Ship content",time:"45m",
    note:"Post the ammo you batched Monday.",
    steps:[
      "Post today's video to TikTok + Reels + LinkedIn.",
      "Founder-story hook in the first 3 seconds — always.",
      "Write and post one text post.",
      "Reply to 5 comments to feed the algorithm."
    ]};}
  function logclose(){return {t:"Log & close",time:"15m",
    note:"Shut it down clean.",
    steps:[
      "Update your checklist — what actually got done.",
      "One line: which channel moved the needle today?",
      "Set tomorrow's #1 priority.",
      "Close the laptop. Done is done."
    ]};}

  /* rotating deep-work per weekday */
  var ROTATE={
    Mon:{t:"Batch content",time:"120m",tag:"deep work",
      note:"Front-load the whole week so you never scramble midweek.",
      steps:[
        "Film 3–5 short videos in one sitting (CapCut on phone).",
        "Each = one small-biz problem → one AI tool that fixes it.",
        "Write all 7 text posts for the week.",
        "Save them organized so daily posting takes 2 minutes."
      ]},
    Tue:{t:"Funnel maintenance",time:"120m",tag:"deep work",
      note:"A leaky funnel wastes every visitor you fought for.",
      steps:[
        "Open the Product Finder + landing page on your phone.",
        "Find where people drop — usually the step right before signup.",
        "Fix the single biggest leak: copy, button, or load speed.",
        "Run the full flow yourself start to finish on mobile."
      ]},
    Wed:{t:"Write one SEO page",time:"120m",tag:"deep work",
      note:"Slow burn, but it's the only channel that compounds while you sleep.",
      steps:[
        "Write one use-case page: 'Best AI [tool] for [your niche]'.",
        "600–900 words that actually answer the search.",
        "Link to the relevant Shiftable listings.",
        "Publish, then submit the URL in Google Search Console."
      ]},
    Thu:{t:"Gatekeeper outreach",time:"120m",tag:"deep work",
      note:"Your trust channel — credibility, not volume. Don't expect a flood.",
      steps:[
        "Contact 5 advisors / accountants / SCORE mentors.",
        "Angle: 'this genuinely helps your clients' — never 'please promote me'.",
        "Offer to show them the Finder live.",
        "Log who's warm for a second touch."
      ]},
    Fri:{t:"Manage the $500 ad test",time:"120m",tag:"deep work",
      note:"The ads' job is DATA — find your cost-per-account.",
      steps:[
        "Open Meta + Reddit ad dashboards.",
        "Calculate cost-per-account for each.",
        "Shift budget to the winner, pause the loser.",
        {w:true,s:"Kill rule: under $2/account → scale. Over $5 → stop paying, go organic."}
      ]},
    Sat:{t:"Analytics + weekly email",time:"120m",tag:"deep work",
      note:"Review the week, then feed your only compounding asset.",
      steps:[
        "Full week review: which channel drove the most signups?",
        "Decide what you double down on next week.",
        "Write + send your 'best AI tools for small biz' email to your list.",
        "That list is the one thing you own outright. Grow it."
      ]}
  };

  function standardDay(rot){return [scoreboard(),outreach(),community(),rot,content(),logclose()];}

  var SUNDAY=[
    {t:"Weekly review",time:"30m",tag:"light",
      note:"One light touch, then actually rest.",
      steps:[
        "Compare this week's numbers to the 1000 goal (gauge above).",
        "Are you on pace? Days left × ~18/day should clear it — check.",
        "Pick next week's ONE focus. Just one.",
        {w:true,s:"Rest is part of the plan. 8 weeks is a marathon — recover or you'll break."}
      ]},
    {t:"Log & rest",time:"5m",
      note:"Close the week.",
      steps:[
        "Note your best win of the week — bank the momentum.",
        "Set Monday's batch-content plan so you hit the ground running.",
        "Then stop. Go live your life today."
      ]}
  ];

  var ORDER=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var LONG={Mon:"Monday",Tue:"Tuesday",Wed:"Wednesday",Thu:"Thursday",Fri:"Friday",Sat:"Saturday",Sun:"Sunday"};
  var THEME={Mon:"Batch & attack",Tue:"Fix the funnel",Wed:"Plant SEO",Thu:"Work the gatekeepers",Fri:"Read the ad data",Sat:"Review & email",Sun:"Reset"};

  function tasksForDay(dayNum){
    var key=ORDER[(dayNum-1)%7];
    if(key==="Sun")return SUNDAY;
    return standardDay(ROTATE[key]);
  }

  /* ---------- state ---------- */
  function loadState(){
    var s=store.get("shiftable_state");
    if(s){try{return JSON.parse(s);}catch(e){}}
    return {day:1,progress:0,buyers:0};
  }
  function saveState(st){store.set("shiftable_state",JSON.stringify(st));}
  var state=loadState();

  /* ---------- render ---------- */
  var $=function(id){return document.getElementById(id);};

  function render(){
    var key=ORDER[(state.day-1)%7];
    $("dayNum").textContent=state.day;
    $("weekday").textContent=LONG[key]+" · "+THEME[key];

    // days to Sept 1
    var now=new Date();
    var diff=Math.ceil((SPRINT_END-now)/86400000);
    $("daysLeft").textContent=diff>0?diff:0;

    // gauge
    var pct=Math.min(100,(state.buyers/GOAL)*100);
    $("fill").style.width=pct+"%";
    $("bc").textContent=state.buyers;
    if(document.activeElement!==$("bcInput"))$("bcInput").value=state.buyers?state.buyers:"";

    var tasks=tasksForDay(state.day);
    var host=$("tasks");host.innerHTML="";
    var dc=$("dayComplete");dc.innerHTML="";

    // progress dots
    var dots=$("dots");dots.innerHTML="";
    for(var d=0;d<tasks.length;d++){
      var i=document.createElement("i");
      if(d<state.progress)i.className="done";
      else if(d===state.progress)i.className="now";
      dots.appendChild(i);
    }

    tasks.forEach(function(task,idx){
      var el=document.createElement("div");
      el.className="task";
      var num=String(idx+1).padStart(2,"0");

      if(idx<state.progress){
        el.className="task done";
        el.innerHTML=
          '<div class="trow"><div class="tnum">'+num+'</div>'+
          '<div class="ttitle">'+task.t+'</div>'+
          '<div class="ttime mono">'+task.time+'</div>'+
          '<div class="tcheck"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.8 9.2L10 3.2" stroke="#04140b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>'+
          '<div class="tbody collapsed">'+bodyHTML(task)+'</div>';
        el.querySelector(".trow").addEventListener("click",function(){
          var b=this.parentNode.querySelector(".tbody");b.classList.toggle("collapsed");
        });
      } else if(idx===state.progress){
        el.className="task now";
        el.innerHTML=
          '<div class="trow"><div class="tnum">'+num+'</div>'+
          '<div class="ttitle">'+task.t+(task.tag?'<span class="tag">'+task.tag+'</span>':'')+'</div>'+
          '<div class="ttime mono">'+task.time+'</div></div>'+
          '<div class="tbody">'+bodyHTML(task)+
          '<button class="cbtn">Mark complete →</button></div>';
        el.querySelector(".cbtn").addEventListener("click",completeTask);
      } else {
        el.className="task locked";
        el.innerHTML=
          '<div class="trow"><div class="tnum">'+num+'</div>'+
          '<div class="ttitle">Locked</div>'+
          '<div class="lockicon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="6" width="9" height="6.5" rx="1.3" stroke="#5D6675" stroke-width="1.4"/><path d="M4.5 6V4.3a2.5 2.5 0 015 0V6" stroke="#5D6675" stroke-width="1.4"/></svg></div></div>';
      }
      host.appendChild(el);
    });

    // day complete
    if(state.progress>=tasks.length){
      dc.innerHTML=
        '<div class="complete"><h3>Day '+state.day+' cleared.</h3>'+
        '<p>Momentum banked. Next day unlocks fresh tasks.</p>'+
        '<button id="advBtn">Start Day '+(state.day+1)+' →</button></div>';
      $("advBtn").addEventListener("click",function(){
        state.day+=1;state.progress=0;saveState(state);render();
        window.scrollTo({top:0,behavior:"smooth"});
      });
    }
  }

  function bodyHTML(task){
    var h='';
    if(task.note)h+='<div class="note">'+task.note+'</div>';
    h+='<ul>';
    task.steps.forEach(function(s){
      if(typeof s==="object"&&s.w)h+='<li class="warn">'+s.s+'</li>';
      else h+='<li>'+s+'</li>';
    });
    h+='</ul>';
    return h;
  }

  function completeTask(){
    state.progress+=1;saveState(state);render();
    var dc=$("dayComplete");
    if(dc.innerHTML)dc.scrollIntoView({behavior:"smooth",block:"center"});
  }

  /* ---------- gauge input ---------- */
  $("bcSave").addEventListener("click",function(){
    var v=parseInt($("bcInput").value,10);
    if(isNaN(v)||v<0)v=0;
    state.buyers=v;saveState(state);render();
  });
  $("bcInput").addEventListener("keydown",function(e){if(e.key==="Enter")$("bcSave").click();});

  /* ---------- resets ---------- */
  $("resetDay").addEventListener("click",function(){
    if(confirm("Reset today's task progress?")){state.progress=0;saveState(state);render();}
  });
  $("resetAll").addEventListener("click",function(){
    if(confirm("Wipe everything — day, progress, and buyer count? This can't be undone.")){
      state={day:1,progress:0,buyers:0};saveState(state);render();window.scrollTo({top:0,behavior:"smooth"});
    }
  });

  render();
})();
</script>
</body>
</html>
